<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>会速记 AI 会议纪要助手</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">AI</div>
        <div>
          <h1>会速记</h1>
          <p>会议转写整理、结构化纪要与会后追问</p>
        </div>
      </div>
      <div class="status" id="engineStatus">本地演示可用</div>
    </header>

    <main class="workspace">
      <section class="input-pane" aria-label="会议输入区">
        <div class="section-heading">
          <h2>会议内容</h2>
          <button class="icon-button" id="loadSampleButton" title="载入示例" aria-label="载入示例">↺</button>
        </div>

        <label class="field">
          <span>会议标题</span>
          <input id="titleInput" type="text" value="7 月运营活动复盘会" placeholder="输入会议标题">
        </label>

        <label class="field">
          <span>转写文本</span>
          <textarea id="transcriptInput" placeholder="粘贴会议转写文本，或上传 .txt 文件"></textarea>
        </label>

        <div class="upload-row">
          <label class="file-control">
            <input id="fileInput" type="file" accept=".txt,text/plain">
            上传文本
          </label>
          <button class="primary-button" id="generateButton">生成纪要</button>
        </div>
      </section>

      <section class="result-pane" aria-label="结果展示区">
        <div class="result-header">
          <div>
            <h2 id="resultTitle">结构化纪要</h2>
            <p id="resultMeta">生成后将展示摘要、决策、待办和风险。</p>
          </div>
          <button class="ghost-button" id="copyButton">复制纪要</button>
        </div>

        <div class="summary-band" id="summaryList"></div>

        <div class="grid">
          <article class="panel">
            <h3>关键决策</h3>
            <ul id="decisionList"></ul>
          </article>
          <article class="panel">
            <h3>风险提醒</h3>
            <ul id="riskList"></ul>
          </article>
        </div>

        <article class="panel wide">
          <h3>待办事项</h3>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>负责人</th>
                  <th>任务</th>
                  <th>截止时间</th>
                  <th>状态</th>
                </tr>
              </thead>
              <tbody id="actionTable"></tbody>
            </table>
          </div>
        </article>

        <article class="panel ask-panel">
          <h3>纪要追问</h3>
          <div class="chips" id="hintList"></div>
          <div class="ask-row">
            <input id="questionInput" type="text" placeholder="例如：本次会议最大的风险是什么？">
            <button class="primary-button" id="askButton">追问</button>
          </div>
          <pre id="answerBox"></pre>
        </article>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
